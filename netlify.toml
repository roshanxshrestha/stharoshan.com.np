# ══════════════════════════════════════════════════════════════
# netlify.toml — Netlify Build & Deploy Configuration
# stharoshan.com.np
# ══════════════════════════════════════════════════════════════

[build]
  # No build command needed — pure static site
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# ─── PRODUCTION CONTEXT ───────────────────────────────────────
[context.production]
  publish = "."

# ─── DEPLOY PREVIEWS ──────────────────────────────────────────
[context.deploy-preview]
  publish = "."

# ─── REDIRECTS ────────────────────────────────────────────────
[[redirects]]
  from    = "http://www.stharoshan.com.np/*"
  to      = "https://stharoshan.com.np/:splat"
  status  = 301
  force   = true

[[redirects]]
  from    = "https://www.stharoshan.com.np/*"
  to      = "https://stharoshan.com.np/:splat"
  status  = 301
  force   = true

[[redirects]]
  from    = "/index.html"
  to      = "/"
  status  = 301
  force   = true

# Catch-all fallback
[[redirects]]
  from    = "/*"
  to      = "/index.html"
  status  = 200

# ─── HEADERS ──────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options             = "SAMEORIGIN"
    X-Content-Type-Options      = "nosniff"
    Referrer-Policy             = "strict-origin-when-cross-origin"
    Strict-Transport-Security   = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy          = "camera=(), microphone=(), geolocation=(), payment=()"
    X-XSS-Protection            = "1; mode=block"

[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=15552000"

[[headers]]
  for = "/assets/pdf/*"
  [headers.values]
    Cache-Control       = "public, max-age=2592000"
    Content-Disposition = "inline"
