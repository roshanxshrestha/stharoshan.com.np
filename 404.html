<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Roshan Shrestha</title>
    <meta
      name="description"
      content="Page not found — Roshan Shrestha Portfolio"
    />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://stharoshan.com.np/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="./assets/images/favicon/favicon.ico" sizes="any" />
    <link
      rel="icon"
      href="./assets/images/favicon/favicon-96x96.png"
      sizes="96x96"
      type="image/png"
    />
    <link
      rel="apple-touch-icon"
      href="./assets/images/favicon/apple-touch-icon.png"
      sizes="180x180"
    />
    <link rel="manifest" href="./assets/images/favicon/site.webmanifest" />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <script>
      (function () {
        try {
          var s = localStorage.getItem("rs-theme");
          var m = window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
          document.documentElement.setAttribute("data-theme", s || m);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
    <style>
      .error-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem 1.5rem;
        background: var(--surface);
      }
      .error-code {
        font-family: "DM Mono", monospace;
        font-size: clamp(5rem, 18vw, 9rem);
        font-weight: 500;
        color: var(--surface-3);
        line-height: 1;
        letter-spacing: -0.04em;
        margin-bottom: 0;
        user-select: none;
      }
      .error-title {
        font-size: clamp(1.2rem, 3vw, 1.6rem);
        font-weight: 500;
        color: var(--ink);
        margin: 0.5rem 0 1rem;
      }
      .error-desc {
        font-size: 0.95rem;
        color: var(--ink-3);
        max-width: 380px;
        line-height: 1.7;
        margin-bottom: 2rem;
      }
      .error-links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
      }
      .error-mono {
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        color: var(--ink-4);
        letter-spacing: 0.08em;
        margin-top: 2.5rem;
      }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-code" aria-hidden="true">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-desc">
        The page you're looking for doesn't exist or has been moved. Head back
        to the portfolio — everything is there.
      </p>
      <div class="error-links">
        <a href="/" class="btn btn-primary">← Back to Portfolio</a>
        <a href="/#contact" class="btn btn-outline">Contact Me</a>
      </div>
      <p class="error-mono">stharoshan.com.np</p>
    </div>
    <script src="./assets/js/main.js" defer></script>
  </body>
</html>
